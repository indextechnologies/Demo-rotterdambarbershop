<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="185" fill="#1e1c1b"/>

  <!-- Diamond shape (rotated square) -->
  <polygon points="200,60 340,200 200,340 60,200" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Inner diamond (slightly smaller) -->
  <polygon points="200,75 325,200 200,325 75,200" fill="none" stroke="#666" stroke-width="0.8"/>

  <!-- Top tick marks -->
  <g stroke="#888" stroke-width="1.5">
    <line x1="152" y1="121" x2="152" y2="133"/>
    <line x1="160" y1="116" x2="160" y2="128"/>
    <line x1="168" y1="112" x2="168" y2="124"/>
    <line x1="176" y1="108" x2="176" y2="120"/>
    <line x1="184" y1="105" x2="184" y2="117"/>
    <line x1="192" y1="102" x2="192" y2="114"/>
    <line x1="200" y1="101" x2="200" y2="113"/>
    <line x1="208" y1="102" x2="208" y2="114"/>
    <line x1="216" y1="105" x2="216" y2="117"/>
    <line x1="224" y1="108" x2="224" y2="120"/>
    <line x1="232" y1="112" x2="232" y2="124"/>
    <line x1="240" y1="116" x2="240" y2="128"/>
    <line x1="248" y1="121" x2="248" y2="133"/>
  </g>

  <!-- Bottom tick marks -->
  <g stroke="#888" stroke-width="1.5">
    <line x1="152" y1="267" x2="152" y2="279"/>
    <line x1="160" y1="272" x2="160" y2="284"/>
    <line x1="168" y1="276" x2="168" y2="288"/>
    <line x1="176" y1="280" x2="176" y2="292"/>
    <line x1="184" y1="283" x2="184" y2="295"/>
    <line x1="192" y1="285" x2="192" y2="297"/>
    <line x1="200" y1="287" x2="200" y2="299"/>
    <line x1="208" y1="285" x2="208" y2="297"/>
    <line x1="216" y1="283" x2="216" y2="295"/>
    <line x1="224" y1="280" x2="224" y2="292"/>
    <line x1="232" y1="276" x2="232" y2="288"/>
    <line x1="240" y1="272" x2="240" y2="284"/>
    <line x1="248" y1="267" x2="248" y2="279"/>
  </g>

  <!-- ROTTERDAM text -->
  <text x="200" y="210"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="46"
    font-weight="900"
    fill="#d93a2b"
    text-anchor="middle"
    letter-spacing="3"
    style="text-transform:uppercase">ROTTERDAM</text>

  <!-- BARBER SHOP text -->
  <text x="200" y="240"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="14"
    fill="#c8892a"
    text-anchor="middle"
    letter-spacing="6">BARBER SHOP</text>

  <!-- Scissors icon -->
  <g transform="translate(200, 295) scale(1.1)">
    <!-- Left blade -->
    <line x1="-4" y1="-22" x2="-18" y2="10" stroke="#c8892a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right blade -->
    <line x1="4" y1="-22" x2="18" y2="10" stroke="#c8892a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left handle ring -->
    <circle cx="-20" cy="15" r="5" fill="none" stroke="#c8892a" stroke-width="2"/>
    <!-- Right handle ring -->
    <circle cx="20" cy="15" r="5" fill="none" stroke="#c8892a" stroke-width="2"/>
    <!-- Center pivot -->
    <circle cx="0" cy="-5" r="2" fill="#c8892a"/>
  </g>
</svg>
